<!-- index.html -->

<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/dark.css">
    <style>
        .sidebar li.active {
            background-color: #555;
        }

        .markdown-section p.tip,
        .markdown-section tr:nth-child(2n) {
        background-color:#444;
        }

        .markdown-section tr {
            border-top: 1px solid #555;
        }

        .markdown-section td, .markdown-section th {
            border: 1px solid #555;
        }

        .markdown-section p.tip code {
            background-color: #555;
            color: #fff;
        }

        .page_toc code {
            background-color: #555;
        }

        .markdown-section hr, .search {
            border-bottom: 1px solid #777 !important;
        }

        .markdown-section p.warn > strong {
            color: #c8c8c8;
        }
        
        .sidebar-toggle {
            display: none;
        }


        :root {
            --docsifytabs-border-color: #555;
            --docsifytabs-tab-highlight-color: var(--theme-color,#ea6f5a);

            --docsifytabs-tab-background: #444;
            --docsifytabs-tab-background-active: #3f3f3f;
        }
    </style>
    <title>Maze Studio</title>
</head>
<body>
    <div id="app"></div>
    <script>
        window.$docsify = {
            basePath: '/',
            name: 'Maze Studio',
            repo: 'https://github.com/mazestd/',
            loadSidebar: 'sidebar.md',
            search: {
                paths: 'auto',
                placeholder: {
                    '/id/': 'Pencarian',
                    '/': 'Search'
                },
                noData: {
                    '/id/': 'Tidak ada hasil!',
                    '/': 'No results!'
                },
                depth: 6
            },
        }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    <script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
